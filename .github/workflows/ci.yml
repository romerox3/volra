name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./cmd/volra

      - name: Test
        run: go test ./... -v -race -count=1

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1

      - name: ShellCheck
        run: shellcheck install.sh
