name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: make build-all VERSION=${{ github.ref_name }}

      - name: Generate checksums
        run: make checksums

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/volra-darwin-arm64
            bin/volra-linux-amd64
            bin/volra-linux-arm64
            bin/SHA256SUMS
          generate_release_notes: true

      - name: Trigger Homebrew tap update
        if: success()
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.TAP_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/romerox3/homebrew-volra/dispatches" \
            -d '{"event_type":"new-release","client_payload":{"version":"${{ github.ref_name }}"}}'
        continue-on-error: true
