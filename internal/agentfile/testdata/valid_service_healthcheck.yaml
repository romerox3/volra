version: 1
name: my-agent
framework: generic
port: 8000
health_path: /health
dockerfile: auto
services:
  db:
    image: postgres:16
    port: 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
